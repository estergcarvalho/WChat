version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: wchat-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: wchat
    volumes:
      - mongodb_data:/data/db
    networks:
      - wchat-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:

networks:
  wchat-network:
    driver: bridge

